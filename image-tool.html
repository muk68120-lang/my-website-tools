<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Photo Tool</title><style>
body{
    background:#020617;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

.box{
    max-width:420px;
    margin:auto;
    padding:20px;
    background:#0f172a;
    border-radius:20px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:none;
}

button{
    background:#22c55e;
    font-weight:bold;
}

.drop{
    border:2px dashed #22c55e;
    padding:20px;
    border-radius:15px;
    margin-bottom:10px;
}

.preview{
    display:flex;
    gap:10px;
}

.preview img{
    width:48%;
    border-radius:10px;
}

#download{
    display:none;
    background:#22c55e;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:black;
    font-weight:bold;
}
</style></head><body><div class="box">
<h2>📸 Exam Photo Tool (300 DPI)</h2><div class="drop" id="drop">Drop Image</div>
<input type="file" id="file"><h3>📏 Photo Size (300 DPI)</h3>
<select id="preset">
<option value="">Original</option>
<option value="passport">3.5 × 4.5 cm (Passport)</option>
<option value="small">2 × 2 cm</option>
<option value="medium">4 × 4 cm</option>
<option value="large">5 × 5 cm</option>
<option value="custom">Custom (cm)</option>
</select><div id="customBox" style="display:none;">
<input type="number" id="cmW" placeholder="Width (cm)">
<input type="number" id="cmH" placeholder="Height (cm)">
</div><h3>🎯 Target Size</h3>
<input type="number" id="size" placeholder="e.g. 50 (KB)">
<select id="unit">
<option value="kb">KB</option>
<option value="mb">MB</option>
</select><h3>🖼 Format</h3>
<select id="format">
<option value="jpeg">JPG</option>
<option value="webp">WEBP</option>
</select><button onclick="process()">PROCESS</button>

<p id="info"></p><div class="preview">
<img id="before">
<img id="after">
</div><a id="download">Download</a>

</div><script>

const fileInput=document.getElementById("file");
const drop=document.getElementById("drop");
const preset=document.getElementById("preset");
const customBox=document.getElementById("customBox");

drop.ondragover=e=>e.preventDefault();
drop.ondrop=e=>{
    e.preventDefault();
    if(e.dataTransfer.files.length){
        fileInput.files=e.dataTransfer.files;
    }
};

// show custom inputs
preset.onchange=()=>{
    customBox.style.display = preset.value==="custom" ? "block":"none";
};

function cmToPx(cm){
    return Math.round(cm*(300/2.54));
}

function getSizeKB(data){
    let b=data.split(',')[1];
    let pad=(b.match(/=/g)||[]).length;
    return ((b.length*3)/4-pad)/1024;
}

function process(){

let file=fileInput.files[0];
if(!file) return alert("Image daalo 😑");

let size=parseFloat(document.getElementById("size").value)||50;
let unit=document.getElementById("unit").value;
let format=document.getElementById("format").value;

let targetKB=unit==="mb"?size*1024:size;

let img=new Image();
let reader=new FileReader();

reader.onload=e=>{
    img.src=e.target.result;
    document.getElementById("before").src=e.target.result;
};

img.onload=()=>{

let w=img.width;
let h=img.height;

// preset sizes
switch(preset.value){
    case "passport": w=cmToPx(3.5); h=cmToPx(4.5); break;
    case "small": w=cmToPx(2); h=cmToPx(2); break;
    case "medium": w=cmToPx(4); h=cmToPx(4); break;
    case "large": w=cmToPx(5); h=cmToPx(5); break;
    case "custom":
        let cmW=parseFloat(document.getElementById("cmW").value);
        let cmH=parseFloat(document.getElementById("cmH").value);
        if(cmW && cmH){
            w=cmToPx(cmW);
            h=cmToPx(cmH);
        }
        break;
}

let canvas=document.createElement("canvas");
canvas.width=w;
canvas.height=h;

canvas.getContext("2d").drawImage(img,0,0,w,h);

let mime=format==="webp"?"image/webp":"image/jpeg";

let best=null;
let bestDiff=99999;

// smart compression (quality first)
for(let q=0.9;q>=0.3;q-=0.05){
    let data=canvas.toDataURL(mime,q);
    let s=getSizeKB(data);

    let diff=Math.abs(s-targetKB);
    if(diff<bestDiff){
        bestDiff=diff;
        best=data;
    }
}

let finalSize=getSizeKB(best).toFixed(2);

document.getElementById("after").src=best;

let link=document.getElementById("download");
link.href=best;
link.download="photo.jpg";
link.style.display="block";

document.getElementById("info").innerText=
"Final: "+finalSize+" KB (300 DPI Ready)";
};

reader.readAsDataURL(file);
}

</script></body>
</html>
