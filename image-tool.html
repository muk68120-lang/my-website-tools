<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>AI BG Remover</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<style>
body{background:#020617;color:white;text-align:center;font-family:sans-serif;}
.box{max-width:400px;margin:auto;padding:20px;background:#0f172a;border-radius:20px;}
button,input{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:none;}
button{background:#22c55e;font-weight:bold;}
img{width:100%;margin-top:10px;border-radius:10px;}
</style>
</head><body>
<div class="box">
<h2>🤖 AI Background Remover</h2><input type="file" id="file">
<select id="bg">
<option value="transparent">Transparent</option>
<option value="white">White</option>
<option value="blue">Blue</option>
<option value="green">Green</option>
</select><button onclick="run()">Remove Background</button>

<img id="out">
<a id="download">Download</a>
</div><script>

let session;

// load AI model
async function loadModel(){
session = await ort.InferenceSession.create(
"https://huggingface.co/onnx-community/u2net/resolve/main/u2net.onnx"
);
}
loadModel();

function preprocess(img){
let canvas=document.createElement("canvas");
canvas.width=320;
canvas.height=320;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,320,320);

let data=ctx.getImageData(0,0,320,320).data;

let arr=new Float32Array(1*3*320*320);

for(let i=0;i<320*320;i++){
arr[i] = data[i*4]/255;
arr[i+320*320] = data[i*4+1]/255;
arr[i+2*320*320] = data[i*4+2]/255;
}

return new ort.Tensor("float32",arr,[1,3,320,320]);
}

async function run(){

let file=document.getElementById("file").files[0];
if(!file) return alert("Image daal");

let img=new Image();
img.src=URL.createObjectURL(file);

img.onload=async()=>{

let input=preprocess(img);
let output=await session.run({input});

let mask=output[Object.keys(output)[0]].data;

let canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0);

let imgData=ctx.getImageData(0,0,img.width,img.height);

for(let i=0;i<img.width*img.height;i++){
let m=mask[Math.floor(i/(img.width*img.height)*320*320)];
imgData.data[i*4+3]=m*255;
}

ctx.putImageData(imgData,0,0);

// background replace
let bg=document.getElementById("bg").value;

if(bg!=="transparent"){
ctx.globalCompositeOperation="destination-over";
ctx.fillStyle=bg;
ctx.fillRect(0,0,canvas.width,canvas.height);
}

let url=canvas.toDataURL("image/png");

document.getElementById("out").src=url;

let link=document.getElementById("download");
link.href=url;
link.download="bg-removed.png";
link.style.display="block";
};
}

</script></body>
</html>
