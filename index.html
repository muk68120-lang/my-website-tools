<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

.container {
  width: 320px;
}

.display {
  background: #020617;
  padding: 20px;
  border-radius: 15px;
  text-align: right;
  font-size: 28px;
  margin-bottom: 10px;
  word-wrap: break-word;
}

.history {
  height: 60px;
  overflow-y: auto;
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 8px;
}

button {
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  background: #334155;
  color: white;
}

button:hover {
  background: #475569;
}

.equal {
  background: #22c55e;
}

.operator {
  background: #2563eb;
}

.clear {
  background: #ef4444;
}
</style>
</head>

<body>

<div class="container">

<div class="history" id="history"></div>
<div class="display" id="display">0</div>

<div class="buttons">
<button class="clear" onclick="clearAll()">C</button>
<button onclick="backspace()">⌫</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>
<button onclick="append('Math.sqrt(')">√</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>
<button onclick="append('**2')">x²</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>
<button onclick="append('Math.pow(')">xʸ</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.tan(')">tan</button>

<button class="equal" onclick="calculate()" style="grid-column: span 5">=</button>
</div>

</div>

<script>
let display = document.getElementById("display");
let history = document.getElementById("history");

function append(val){
  if(display.innerText === "0") display.innerText = "";
  display.innerText += val;
}

function clearAll(){
  display.innerText = "0";
}

function backspace(){
  display.innerText = display.innerText.slice(0,-1) || "0";
}

function calculate(){
  try{
    let result = eval(display.innerText);
    history.innerHTML += display.innerText + " = " + result + "<br>";
    display.innerText = result;
  }catch{
    display.innerText = "Error";
  }
}
</script>

</body>
</html>
