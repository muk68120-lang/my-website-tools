<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Calculator</title><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#141e30,#243b55);
  font-family:sans-serif;
}

.calculator{
  width:100%;
  max-width:360px;
  padding:20px;
  border-radius:25px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

#display{
  width:100%;
  height:70px;
  border:none;
  outline:none;
  font-size:30px;
  text-align:right;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.15);
  color:#fff;
  margin-bottom:15px;
  font-weight:bold;
  font-family:"Courier New", monospace;
  letter-spacing:2px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

button{
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  color:white;
  font-weight:bold;
}

button:active{
  transform:scale(0.9);
}

.operator{background:#ff9500;}
.equal{background:#00c853;}
.clear{background:#ff3b30;}
.mic{background:#007aff;}
</style></head><body><div class="calculator">
<input id="display" readonly><div class="buttons"><button class="clear" onclick="clearDisplay()">C</button>
<button onclick="backspace()">⌫</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('*')">×</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button onclick="append('^')">^</button>

<button onclick="append('sin(')">sin</button>
<button onclick="append('cos(')">cos</button>
<button onclick="append('tan(')">tan</button>
<button onclick="append('√(')">√</button>

<button onclick="append('log(')">log</button>
<button onclick="append('π')">π</button>
<button onclick="append('e')">e</button>
<button class="mic" onclick="startVoice()">🎤</button>

</div>
</div><script>
let display=document.getElementById("display");

function append(v){ display.value+=v; }
function clearDisplay(){ display.value=""; }
function backspace(){ display.value=display.value.slice(0,-1); }

function toRad(x){ return x*Math.PI/180; }

/* CALCULATION */
function calculate(){
  let input=display.value;

  try{
    let exp=input
      .replace(/π|pi/g,"Math.PI")
      .replace(/\be\b/g,"Math.E")
      .replace(/√/g,"Math.sqrt(")
      .replace(/log\(/g,"Math.log10(")
      .replace(/sin\(/g,"Math.sin(toRad(")
      .replace(/cos\(/g,"Math.cos(toRad(")
      .replace(/tan\(/g,"Math.tan(toRad(")
      .replace(/\^/g,"**");

    let open=(exp.match(/\(/g)||[]).length;
    let close=(exp.match(//g)||[]).length;
    if(open>close){ exp+=')'.repeat(open-close); }

    let result=Function("toRad","return " + exp)(toRad);

    if(!isFinite(result)) throw "err";

    display.value=result;

    speakHindi(result);

  }catch{
    display.value="Error";
    speak("गणना में त्रुटि");
  }
}

/* WORD TO NUMBER */
function wordsToNumber(text){
  const map={
    "zero":0,"ek":1,"do":2,"teen":3,"char":4,"paanch":5,
    "chhe":6,"saat":7,"aath":8,"nau":9,
    "das":10,"gyarah":11,"barah":12,"terah":13,"chaudah":14,"pandrah":15,
    "solah":16,"satrah":17,"atharah":18,"unnis":19,
    "bees":20,"pachis":25,"tees":30,"chalis":40,"pachaas":50,
    "saath":60,"sattar":70,"assi":80,"nabbe":90,
    "sau":100,"hazaar":1000,"lakh":100000
  };

  return text.split(" ").map(w=>{
    return map[w]!==undefined ? map[w] : w;
  }).join(" ");
}

/* VOICE */
function startVoice(){
  let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="hi-IN";

  rec.onresult=e=>{
    let t=e.results[0][0].transcript.toLowerCase();

    t=wordsToNumber(t);

    t=t
      .replace(/plus|jor/g,"+")
      .replace(/minus|ghata/g,"-")
      .replace(/multiply|guna|x/g,"*")
      .replace(/divide|bhaag/g,"/")
      .replace(/power/g,"^")
      .replace(/sin/g,"sin(")
      .replace(/cos/g,"cos(")
      .replace(/tan/g,"tan(")
      .replace(/log/g,"log(")
      .replace(/root/g,"√(")
      .replace(/pi/g,"π");

    let open=(t.match(//g)||[]).length;
    let close=(t.match(//g)||[]).length;
    if(open>close){ t+=')'.repeat(open-close); }

    t=t.replace(/\s+/g,"");

    display.value=t;

    calculate();
  };

  rec.start();
}

/* NUMBER TO HINDI */
function numberToHindi(n){
  if(isNaN(n)) return n;

  const ones=["","एक","दो","तीन","चार","पांच","छह","सात","आठ","नौ"];
  const teens=["दस","ग्यारह","बारह","तेरह","चौदह","पंद्रह","सोलह","सत्रह","अठारह","उन्नीस"];
  const tens=["","","बीस","तीस","चालीस","पचास","साठ","सत्तर","अस्सी","नब्बे"];

  function convert(num){
    if(num<10) return ones[num];
    if(num<20) return teens[num-10];
    if(num<100) return tens[Math.floor(num/10)]+" "+ones[num%10];
    if(num<1000) return ones[Math.floor(num/100)]+" सौ "+convert(num%100);
    if(num<100000) return convert(Math.floor(num/1000))+" हजार "+convert(num%1000);
    if(num<10000000) return convert(Math.floor(num/100000))+" लाख "+convert(num%100000);
    return num.toString();
  }

  return convert(n);
}

/* SPEAK */
function speakHindi(num){
  speechSynthesis.cancel();

  let text="";
  if(!isFinite(num)){
    text="गणना में त्रुटि";
  }
  else if(Number.isInteger(num)){
    text="उत्तर है "+numberToHindi(num);
  }
  else{
    let parts=num.toString().split(".");
    let intPart=numberToHindi(parseInt(parts[0]));
    let decimalPart=parts[1].split("").map(d=>numberToHindi(parseInt(d))).join(" ");
    text="उत्तर है "+intPart+" दशमलव "+decimalPart;
  }

  let u=new SpeechSynthesisUtterance(text);
  u.lang="hi-IN";
  speechSynthesis.speak(u);
}

function speak(txt){
  let u=new SpeechSynthesisUtterance(txt);
  u.lang="hi-IN";
  speechSynthesis.speak(u);
}
</script></body>
</html>
