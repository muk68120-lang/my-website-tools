<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Calculator</title><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#141e30,#243b55);
  font-family:sans-serif;
}

.calculator{
  width:100%;
  max-width:360px;
  padding:20px;
  border-radius:25px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

#display{
  width:100%;
  height:70px;
  border:none;
  outline:none;
  font-size:30px;
  text-align:right;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.15);
  color:#fff;
  margin-bottom:15px;
  font-weight:bold;
  font-family:"Courier New", monospace;
  letter-spacing:2px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

button{
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  color:white;
  font-weight:bold;
}

button:active{
  transform:scale(0.9);
}

.operator{background:#ff9500;}
.equal{background:#00c853;}
.clear{background:#ff3b30;}
.mic{background:#007aff;}
</style></head><body><div class="calculator">
<input id="display" readonly><div class="buttons"><button class="clear" onclick="clearDisplay()">C</button>
<button onclick="backspace()">⌫</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('*')">×</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button onclick="append('^')">^</button>

<!-- ❌ removed scientific buttons --><button class="mic" onclick="startVoice()">🎤</button>

</div>
</div><script>
let display=document.getElementById("display");

function append(v){ display.value+=v; }
function clearDisplay(){ display.value=""; }
function backspace(){ display.value=display.value.slice(0,-1); }

/* ✅ SIMPLE CALCULATE */
function calculate(){
  let input=display.value;

  try{
    let exp=input.replace(/\^/g,"**");

    let result=eval(exp);

    if(!isFinite(result)) throw "err";

    display.value=result;

    speakHindi(result);

  }catch{
    display.value="Error";
    speak("गणना में त्रुटि");
  }
}

/* 🎤 VOICE (simple only) */
function startVoice(){
  let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="hi-IN";

  rec.onresult=e=>{
    let t=e.results[0][0].transcript.toLowerCase();

    const numMap={
      "zero":"0","ek":"1","do":"2","teen":"3","char":"4",
      "paanch":"5","chhe":"6","saat":"7","aath":"8","nau":"9",
      "das":"10","gyarah":"11","barah":"12","bees":"20",
      "tees":"30","chalis":"40","pachaas":"50","sau":"100"
    };

    Object.keys(numMap).forEach(w=>{
      t=t.replace(new RegExp(w,"g"),numMap[w]);
    });

    t=t
      .replace(/plus|add|jor/g,"+")
      .replace(/minus|ghatav/g,"-")
      .replace(/multiply|guna/g,"*")
      .replace(/divide|bhaag|bhag/g,"/")
      .replace(/power/g,"^");

    t=t.replace(/\s+/g,"");

    display.value=t;

    calculate();
  };

  rec.start();
}

/* 🔊 HINDI SPEAK */
function speakHindi(txt){
  speechSynthesis.cancel();
  let u=new SpeechSynthesisUtterance("उत्तर है " + txt);
  u.lang="hi-IN";
  speechSynthesis.speak(u);
}

function speak(txt){
  let u=new SpeechSynthesisUtterance(txt);
  u.lang="hi-IN";
  speechSynthesis.speak(u);
}
</script></body>
</html>
